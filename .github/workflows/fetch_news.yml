name: Fetch Pharma News

on:
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다 자동 실행
  push:
    branches: [main]
  workflow_dispatch:          # GitHub UI에서 수동 실행 가능

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser beautifulsoup4 lxml

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Commit updated news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "chore: update news data [skip ci]"
          git push
